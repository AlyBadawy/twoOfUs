# ─── DataSource ───────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
# Schema is managed exclusively by Flyway
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ─── Flyway ───────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ─── OAuth2 Resource Server ───────────────────────────────────────────────────
spring.security.oauth2.resourceserver.jwt.issuer-uri=${AUTHENTIK_ISSUER_URI}

# ─── Custom properties ────────────────────────────────────────────────────────
authentik.audience=${AUTHENTIK_AUDIENCE}
anthropic.api-key=${ANTHROPIC_API_KEY}

# ─── OIDC client config (served to the frontend via GET /api/config) ──────────
# authority and client-id reuse the same env vars as the JWT resource server.
# redirect-uri must match a registered redirect URI in your Authentik application.
oidc.client.authority=${AUTHENTIK_ISSUER_URI}
oidc.client.client-id=${AUTHENTIK_AUDIENCE}
oidc.client.redirect-uri=${AUTHENTIK_REDIRECT_URI}

# ─── Scheduling ───────────────────────────────────────────────────────────────
# TODO: Set spring.task.scheduling.time-zone to your local timezone if needed
#       (e.g., America/New_York) so midnight cron fires at the right time.
spring.task.scheduling.pool.size=5

# ─── Actuator (K8s health probes) ─────────────────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
