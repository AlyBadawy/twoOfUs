name: Build & Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "k8s/kustomization.yaml"

env:
  REGISTRY: ghcr.io

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive lowercase image name
        id: meta
        run: |
          echo "image=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" \
            >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ github.sha }}
            ${{ steps.meta.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install kustomize
        run: |
          KUSTOMIZE_VERSION=v5.4.3
          curl -sLO "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2F${KUSTOMIZE_VERSION}/kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz"
          tar xzf "kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz"
          sudo mv kustomize /usr/local/bin/

      - name: Pin image tag in kustomization.yaml
        run: |
          cd k8s
          kustomize edit set image \
            "${{ steps.meta.outputs.image }}=${{ steps.meta.outputs.image }}:${{ github.sha }}"

      - name: Commit and push updated kustomization
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/kustomization.yaml
          git diff --cached --quiet && exit 0
          git commit -m "ci: pin image to ${{ github.sha }}"
          git push
