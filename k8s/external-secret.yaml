# ── DB credentials ─────────────────────────────────────────────────────────────
# Vault key: twoofus-db   properties: host, database, username, password
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: twoofus-db-secret
  namespace: twoofus
  labels:
    app.kubernetes.io/name: twoofus
    homelab/stack: twoofus
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: k8s-secrets
    kind: ClusterSecretStore
  target:
    name: twoofus-db-secret
    creationPolicy: Owner
  data:
    - secretKey: db-host
      remoteRef:
        key: twoofus-db
        property: host
    - secretKey: db-name
      remoteRef:
        key: twoofus-db
        property: database
    - secretKey: db-user
      remoteRef:
        key: twoofus-db
        property: username
    - secretKey: db-password
      remoteRef:
        key: twoofus-db
        property: password
---
# ── App secrets ────────────────────────────────────────────────────────────────
# Vault key: twoofus   properties: anthropic-api-key, authentik-issuer-uri,
#                                  authentik-client-id, authentik-redirect-uri
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: twoofus-app-secret
  namespace: twoofus
  labels:
    app.kubernetes.io/name: twoofus
    homelab/stack: twoofus
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: k8s-secrets
    kind: ClusterSecretStore
  target:
    name: twoofus-app-secret
    creationPolicy: Owner
  data:
    - secretKey: anthropic-api-key
      remoteRef:
        key: twoofus
        property: anthropic-api-key
    - secretKey: authentik-issuer-uri
      remoteRef:
        key: twoofus
        property: authentik-issuer-uri
    - secretKey: authentik-client-id
      remoteRef:
        key: twoofus
        property: authentik-client-id
    - secretKey: authentik-redirect-uri
      remoteRef:
        key: twoofus
        property: authentik-redirect-uri
