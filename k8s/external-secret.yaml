# ── DB credentials ─────────────────────────────────────────────────────────────
# Vault key: twoofus-db   properties: host, database, username, password
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: twoofus-db-secret
  namespace: websites
  labels:
    app.kubernetes.io/name: twoofus
    homelab/stack: twoofus
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: k8s-secrets
    kind: ClusterSecretStore
  target:
    name: twoofus-db-secret
    creationPolicy: Owner
  data:
    - secretKey: db-host
      remoteRef:
        key: twoofus-db
        property: host
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: db-name
      remoteRef:
        key: twoofus-db
        property: database
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: db-user
      remoteRef:
        key: twoofus-db
        property: username
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: db-password
      remoteRef:
        key: twoofus-db
        property: password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
---
# ── App secrets ────────────────────────────────────────────────────────────────
# Vault key: twoofus   properties: anthropic_api_key, authentik_issuer_uri,
#                                  authentik_client_id, authentik_redirect_uri
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: twoofus-app-secret
  namespace: websites
  labels:
    app.kubernetes.io/name: twoofus
    homelab/stack: twoofus
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: k8s-secrets
    kind: ClusterSecretStore
  target:
    name: twoofus-app-secret
    creationPolicy: Owner
  data:
    - secretKey: anthropic-api-key
      remoteRef:
        key: twoofus
        property: anthropic_api_key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: authentik-issuer-uri
      remoteRef:
        key: twoofus
        property: authentik_issuer_uri
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: authentik-client-id
      remoteRef:
        key: twoofus
        property: authentik_client_id
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: authentik-redirect-uri
      remoteRef:
        key: twoofus
        property: authentik_redirect_uri
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
